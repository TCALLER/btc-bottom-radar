name: BTC Bottom Radar — daily

on:
  schedule:
    # 05:30 UTC ≈ 07:30 Europe/Brussels
    - cron: "30 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: btc-bottom-radar-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_DB_SCHEMA: ${{ secrets.SUPABASE_DB_SCHEMA }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PRICE_SOURCE: ${{ secrets.PRICE_SOURCE }}
      ONCHAIN_PROVIDER: ${{ secrets.ONCHAIN_PROVIDER }}
      GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
      TZ: Europe/Brussels
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Collect, persist and send daily digest
        run: python -m collector.main --digest
